<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Bird Fighter 2X Ver.2.2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="wrap">
<div id="top">🐦 BIRD FIGHTER 2X Ver.2.2 🐦</div>
<canvas id="game" width="960" height="540"></canvas>
<div id="hint">↖/↑/↗ジャンプ追加。ゲージMAX時はガード＋必殺で超必殺。</div>
<div id="controls">
  <div class="pad">
    <button id="jumpLeft" data-key="q">↖<br>後J</button>
    <button id="jump" data-key="w">↑<br>J</button>
    <button id="jumpRight" data-key="e">↗<br>前J</button>
    <button id="left" data-key="a">←</button>
    <button id="guard" data-key="s">盾<br>ガード</button>
    <button id="right" data-key="d">→</button>
  </div>
  <div class="actions">
    <button id="start">▶ START</button>
    <button id="throwBtn" data-key="f">投げ</button>
    <button id="kick" data-key="g">キック</button>
    <button id="special" data-key="h">必殺技</button>
  </div>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
